syntax = "proto2";

package protocol;

option java_package = "top.pin90.server.chat.protocol";
option java_outer_classname = "ChatRequestProto";

message ChatReqProto {
  required int32 type = 1;    // 内容的类型
  required bytes content = 2; // 内容的主体
  optional string uri=3;      // 非消息主体的uri
  optional string token = 4;  // 认证令牌
}

